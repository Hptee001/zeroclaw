# Build and release ZeroClaw Desktop for all platforms
name: Build & Release

on:
  push:
    tags:
      - 'v*'
  pull_request:
    branches: [master]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # Build for macOS
  build-macos:
    runs-on: macos-latest
    strategy:
      matrix:
        arch: [x86_64, aarch64]
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
      
      - name: Setup Rust
        uses: dtolnay/rust-action@stable
        with:
          targets: ${{ matrix.arch }}-apple-darwin
      
      - name: Install dependencies
        run: |
          pnpm install
          cargo install tauri-cli --version ^2.0.0
      
      - name: Build Tauri App
        run: pnpm tauri build --target ${{ matrix.arch }}-apple-darwin
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PASSWORD }}
      
      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: zeroclaw-macos-${{ matrix.arch }}
          path: |
            packages/desktop/src-tauri/target/${{ matrix.arch }}-apple-darwin/release/bundle/dmg/*.dmg
            packages/desktop/src-tauri/target/${{ matrix.arch }}-apple-darwin/release/bundle/macos/*.app

  # Build for Windows
  build-windows:
    runs-on: windows-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
      
      - name: Setup Rust
        uses: dtolnay/rust-action@stable
      
      - name: Install dependencies
        shell: bash
        run: |
          pnpm install
          cargo install tauri-cli --version ^2.0.0
      
      - name: Build Tauri App
        shell: bash
        run: pnpm tauri build
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: zeroclaw-windows
          path: |
            packages/desktop/src-tauri/target/release/bundle/msi/*.msi
            packages/desktop/src-tauri/target/release/bundle/nsis/*.exe

  # Build for Linux
  build-linux:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
      
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            libsoup2.4-dev \
            libjavascriptcoregtk-4.1-dev
      
      - name: Setup Rust
        uses: dtolnay/rust-action@stable
      
      - name: Install dependencies
        run: |
          pnpm install
          cargo install tauri-cli --version ^2.0.0
      
      - name: Build Tauri App
        run: pnpm tauri build
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: zeroclaw-linux
          path: |
            packages/desktop/src-tauri/target/release/bundle/deb/*.deb
            packages/desktop/src-tauri/target/release/bundle/appimage/*.AppImage

  # Create GitHub Release
  create-release:
    needs: [build-macos, build-windows, build-linux]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
      
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/zeroclaw-macos-x86_64/**/*.dmg
            artifacts/zeroclaw-macos-aarch64/**/*.dmg
            artifacts/zeroclaw-macos-x86_64/**/*.app
            artifacts/zeroclaw-macos-aarch64/**/*.app
            artifacts/zeroclaw-windows/**/*.msi
            artifacts/zeroclaw-windows/**/*.exe
            artifacts/zeroclaw-linux/**/*.deb
            artifacts/zeroclaw-linux/**/*.AppImage
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
